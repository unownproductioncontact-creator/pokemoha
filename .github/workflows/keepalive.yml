# Keep-alive best-effort (pattern masterball) : ping /healthz ~toutes les 12 min
# pour limiter le spin-down du free tier Render. Complément/fallback d'UptimeRobot.
# ⚠️ Remplace l'URL par celle de TON service Render après le premier déploiement.

name: keepalive

on:
  schedule:
    - cron: "*/12 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /healthz
        run: |
          curl -fsS --max-time 30 --retry 2 --retry-delay 5 \
            https://pokemoha.onrender.com/healthz
